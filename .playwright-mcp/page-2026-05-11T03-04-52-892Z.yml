            - emphasis [ref=e65]: I feel attacked. I feel ignored. I feel manipulated. I feel dismissed. I feel like you're not even trying.
            - text: None of those are feelings. They're hypotheses about another person, smuggled across the border under a feeling's passport. Look at the sentences. Where is your body in any of them? It isn't. The other person is the entire sentence.
          - paragraph [ref=e66]: A real feeling lives in the body. Tight chest. Hot face. The cold thing low in the gut. The shoulder creeping up toward your ear. Sad. Scared. Tired. Lit up. Restless. Tender. Furious. Numb. These are yours. They aren't claims about anyone else, so they can't be argued with.
          - paragraph [ref=e67]:
            - text: The pseudo-feeling —
            - emphasis [ref=e68]: attacked, ignored, dismissed, abandoned, used, disrespected, manipulated, betrayed
            - text: "— carries a charge sheet. It invites the other person to defend rather than meet you. And here is the part that smarts: you reach for these constructions hardest in exactly the moments when something more vulnerable is going on underneath."
          - paragraph [ref=e69]: The charge gets to the mouth before the actual feeling does, because it's shorter and easier to say.
          - paragraph [ref=e70]: This is normal. People who've been practicing for thirty years still do it. The difference is they tend to catch it faster, sometimes before the words are out.
