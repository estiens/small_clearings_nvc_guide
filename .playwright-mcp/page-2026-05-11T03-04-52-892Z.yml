        - paragraph [ref=e778]: You won't say it perfectly under pressure. Nobody does, not consistently, not at first. What actually shifts over years is whether the grammar is becoming more available — whether the hurt is getting faster at finding its words before the verdict gets to the door.
        - generic [ref=e779]: That's all the shift is. The hurt getting faster at finding its words.
        - paragraph [ref=e780]: What earns the practice its keep, beyond the operative fact that it works, is what kind of stance toward another person it requires. NVC is one of the few practices currently available to ordinary humans that takes seriously the idea that the person across from you has an interior that is real, that is theirs, and that isn't yours to manage or correct. The same goes for your interior. You're allowed to be in there — in the body, in the present, with your actual needs — and you're allowed, if it comes to that, to want things out loud.
