        - paragraph [ref=e230]: Sometimes the anger underneath is fear — of losing the connection, or that turning soft will get you killed in the household you grew up in. Sometimes it's grief that hasn't been allowed to weep yet. Or humiliation, the body's response to being made small in public. Or a much older anger on loan from someone in your family who never got to feel theirs — running its old program through you, decades later.
        - paragraph [ref=e231]: Some anger is a tantrum. The wall-punching volatility of an adult who can't tolerate the word no, taking all the oxygen in the room, exhausting, repetitive, fundamentally an attempt to control the environment by terrifying it. Most of us have run this at least once. Many of us grew up with someone who ran it most days.
        - paragraph [ref=e232]: Some anger isn't doing that work at all. It rises when your limits are actively being dismantled — when you are being harmed, gaslit, or trapped — and it stops being a thinking event and becomes a ledger. The part of you that has been keeping an accurate accounting of harm done has finally opened the book.
