            - text: ◆
          - text: ", for the people who have practiced it long enough, becomes a spiritual relationship practice — a discipline of paying attention to weight and contact and movement, which opens over years into something larger than the technique itself. NVC, practiced long enough, becomes something similar. A way of speaking and listening from the present moment, in the body, with the other person's interior treated as real and legitimate, and one's own certainty held more lightly than your nervous system would prefer."
