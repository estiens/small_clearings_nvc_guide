            - text: This is the kind of thing you take up, rather than master. You do it badly, over and over, in actual conversations with actual people — including the conversations you have with yourself. The body learns the shape. The grammar starts to drift in the right direction without your having to think about it. The interior monologue softens, slowly, because the part of you that has been using the language of court has gradually been given other language to use. None of this happens fast. The time scale is closer to learning an instrument than reading a book. The thing changes you, eventually, because the language changes you, but the
