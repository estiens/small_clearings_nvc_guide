        - paragraph [ref=e766]: "For some of us, NVC can re-install the patterning in a more spiritualized costume. The over-listener who never gets a need on the table. The seminar-trained adult who confuses self-abandonment with compassion and starts teaching the confusion to others. The person who learned, somewhere along the way, that wanting things gets you punished, and now has been given a beautiful new vocabulary in which to keep not-wanting things. If you recognize yourself anywhere in that paragraph: the work, for you, is probably less in the listening and more in the asking. Give yourself permission to make demands the practice would technically prefer you frame as requests. Sometimes the request can wait. The asking cannot."
