          - paragraph [ref=e264]: There's a thing people do, once they've learned the surface shape of NVC, where they use the form to deliver the same complaints they were already delivering, in a tone that suggests they've done the reading. The complaint is the same; the vocabulary is more careful. The person on the receiving end still feels, somehow, like they're in trouble — just in a more articulate way than before.
