        - paragraph [ref=e166]: Mattering. Being seen. Rest. Belonging. Solitude. A say in your own life. Safety. Contact. Meaning. Play. Contribution. These are the things that, if you've gone without one of them for too long, you start seeing the absence everywhere else.
        - paragraph [ref=e167]: The need is the why beneath the feeling. You feel hollow because something is hungry for connection. You feel taut because something is fighting for respect — for mattering, more honestly. You feel the low buzz of resentment because something has been quietly trading its own rest for someone else's comfort and the bill has come due.
